<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Monthly Performance Dashboard | Regional Sales Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #eef2f5; padding: 20px; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px 25px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid rgba(160,90,255,0.2); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .header h1 { color: #2d3a45; font-size: 1.8em; font-weight: 600; }
        .header h1 span { color: #A05AFF; font-size: 0.5em; background: rgba(160,90,255,0.1); padding: 4px 10px; border-radius: 20px; margin-left: 10px; font-weight: 500; }
        .refresh-area { display: flex; align-items: center; gap: 15px; }
        .btn-refresh { background: #A05AFF; color: white; border: none; padding: 10px 20px; border-radius: 12px; font-size: 0.9em; font-weight: 500; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; }
        .btn-refresh:hover { background: #8A3FE0; transform: translateY(-2px); }
        .btn-refresh:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .loading-spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .last-updated { color: #64748b; font-size: 0.8em; }
        .filters { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; align-items: flex-end; background: rgba(255,255,255,0.9); padding: 15px 20px; border-radius: 16px; backdrop-filter: blur(10px); border: 1px solid rgba(160,90,255,0.2); }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 0.8em; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .filter-group select, .filter-group input { padding: 10px 15px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 0.9em; background: white; min-width: 150px; cursor: pointer; }
        .filter-group select:focus, .filter-group input:focus { outline: none; border-color: #A05AFF; box-shadow: 0 0 0 2px rgba(160,90,255,0.2); }
        .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid rgba(160,90,255,0.2); transition: transform 0.3s ease; }
        .kpi-card:hover { transform: translateY(-5px); }
        .kpi-card h4 { color: #64748b; font-size: 0.85em; font-weight: 500; margin-bottom: 10px; }
        .kpi-value { font-size: 2em; font-weight: 700; color: #2d3a45; }
        .kpi-sub { font-size: 0.7rem; color: #94a3b8; margin-top: 5px; }
        .charts-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .chart-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid rgba(160,90,255,0.2); }
        .chart-card h3 { color: #2d3a45; margin-bottom: 15px; font-size: 1.1em; }
        canvas { max-height: 400px; }
        .error-message { background: #fee2e2; color: #dc2626; padding: 12px 20px; border-radius: 10px; margin-bottom: 15px; display: none; }
        .footer { text-align: center; margin-top: 30px; color: #64748b; font-size: 0.9em; }
        @media (max-width: 1200px) { .kpi-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Monthly Performance Dashboard <span>Regional Tracker</span></h1>
            <div class="refresh-area">
                <div class="last-updated" id="lastUpdated"></div>
                <button class="btn-refresh" id="refreshBtn" onclick="loadAllData()">🔄 Refresh</button>
            </div>
        </div>
        <div id="errorMessage" class="error-message"></div>
        
        <div class="filters">
            <div class="filter-group"><label>🌍 Region</label><select id="filterRegion"><option value="all">All Regions</option></select></div>
            <div class="filter-group"><label>👤 Agent</label><select id="filterAgent"><option value="all">All Agents</option></select></div>
            <div class="filter-group"><label>🏙️ City</label><select id="filterCity"><option value="all">All Cities</option></select></div>
            <div class="filter-group"><label>📅 Date Range (Start)</label><input type="date" id="dateStart"></div>
            <div class="filter-group"><label>📅 Date Range (End)</label><input type="date" id="dateEnd"></div>
        </div>
        
        <div id="dashboardContent">
            <div class="kpi-grid" id="kpiGrid"></div>
            
            <div class="charts-row">
                <div class="chart-card"><h3>👥 Team-wise: Monthly Goal vs Achieved</h3><canvas id="teamChart"></canvas></div>
                <div class="chart-card"><h3>🌍 City Distribution</h3><canvas id="cityChart"></canvas></div>
            </div>
            
            <div class="chart-card" style="margin-bottom: 25px;">
                <h3>⭐ Agent-wise Detailed Performance</h3>
                <div style="overflow-x: auto;">
                    <canvas id="agentDetailedChart" style="max-height: 500px; width: 100%;"></canvas>
                </div>
            </div>
        </div>
        
        <div class="footer"><p>Data refreshes from Google Sheets | Last sync: <span id="syncTime">—</span></p></div>
    </div>
    <script>
        Chart.register(ChartDataLabels);
        
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz32sowAxDQosCoO29lMhBVRNFuC1_qpaMh_Y_fJ0YTSAvPAfov7MdTAARzGyV3mHQ72A/exec';
        
        const CSV_URLS = {
            region: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTxl3KDZ4k7rNc2Auy9iynlEuXEwjkFiSilwrseOxcH3JLTIsDhE0iWQlGuB0CIgfh_b4IRL3Qfz9Z5/pub?gid=0&single=true&output=csv',
            agent: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTxl3KDZ4k7rNc2Auy9iynlEuXEwjkFiSilwrseOxcH3JLTIsDhE0iWQlGuB0CIgfh_b4IRL3Qfz9Z5/pub?gid=1067745333&single=true&output=csv',
            city: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTxl3KDZ4k7rNc2Auy9iynlEuXEwjkFiSilwrseOxcH3JLTIsDhE0iWQlGuB0CIgfh_b4IRL3Qfz9Z5/pub?gid=477050768&single=true&output=csv',
            config: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTxl3KDZ4k7rNc2Auy9iynlEuXEwjkFiSilwrseOxcH3JLTIsDhE0iWQlGuB0CIgfh_b4IRL3Qfz9Z5/pub?gid=1341037513&single=true&output=csv'
        };

        let regionData = [], agentData = [], cityData = [];
        let configData = { monthlyGoalTotal: 176, dailyGoalPerRegion: 2 };
        let charts = { team: null, city: null, agentDetailed: null };
        let isLoading = false;

        // Your custom colors
        const cityColors = [
            '#9E6849',  // Terracotta Brown
            '#203646',  // Dark Teal
            '#09857C',  // Teal Green
            '#898459'   // Olive Khaki
        ];

        function showError(msg) { const d=document.getElementById('errorMessage'); d.innerHTML=msg; d.style.display='block'; setTimeout(()=>d.style.display='none',5000); }
        function setLoading(l){ isLoading=l; const btn=document.getElementById('refreshBtn'); if(btn){ btn.disabled=l; btn.innerHTML=l?'<span class="loading-spinner"></span> Loading...':'🔄 Refresh'; } }
        
        async function fetchCSV(url) {
            const fullUrl = APPS_SCRIPT_URL + '?url=' + encodeURIComponent(url + '&_=' + new Date().getTime());
            const response = await fetch(fullUrl);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.text();
        }
        
        function parseCSV(csvText) {
            const rows = [];
            const lines = csvText.split(/\r?\n/);
            for (let line of lines) {
                if (line.trim() === '') continue;
                const row = [];
                let inQuotes = false;
                let currentCell = '';
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        row.push(currentCell.trim());
                        currentCell = '';
                    } else {
                        currentCell += char;
                    }
                }
                row.push(currentCell.trim());
                const cleanedRow = row.map(cell => {
                    if (cell.startsWith('"') && cell.endsWith('"')) return cell.slice(1, -1);
                    return cell;
                });
                rows.push(cleanedRow);
            }
            return rows;
        }
        
        async function loadAllData(){
            if(isLoading) return;
            setLoading(true);
            try{
                document.getElementById('lastUpdated').innerHTML='🔄 Loading...';
                
                const [regionCSV, agentCSV, cityCSV, configCSV] = await Promise.all([
                    fetchCSV(CSV_URLS.region),
                    fetchCSV(CSV_URLS.agent),
                    fetchCSV(CSV_URLS.city),
                    fetchCSV(CSV_URLS.config)
                ]);
                
                const regionRows = parseCSV(regionCSV);
                if(regionRows.length > 1){
                    regionData = regionRows.slice(1).map(row => ({
                        region: row[0] || '',
                        date: row[1] || '',
                        dailyGoal: parseFloat(row[2]) || 0,
                        achievedLeads: parseFloat(row[3]) || 0,
                        achievementPct: parseFloat(row[4]) || 0,
                        monthlyGoal: parseFloat(row[5]) || 0,
                        monthlyAchieved: parseFloat(row[6]) || 0,
                        monthlyPct: parseFloat(row[7]) || 0,
                        totalCalls: parseFloat(row[8]) || 0,
                        connectedCalls: parseFloat(row[9]) || 0,
                        whatsapp: parseFloat(row[10]) || 0,
                        emails: parseFloat(row[11]) || 0
                    }));
                }
                
                const agentRows = parseCSV(agentCSV);
                if(agentRows.length > 1){
                    agentData = agentRows.slice(1).map(row => ({
                        srNo: row[0] || '',
                        agent: row[1] ? row[1].trim() : '',
                        region: row[2] || '',
                        totalCalls: parseFloat(row[3]) || 0,
                        connectedCalls: parseFloat(row[4]) || 0,
                        whatsapp: parseFloat(row[5]) || 0,
                        emails: parseFloat(row[6]) || 0,
                        selfProfiling: parseFloat(row[7]) || 0,
                        week1: parseFloat(row[8]) || 0,
                        week2: parseFloat(row[9]) || 0,
                        week3: parseFloat(row[10]) || 0,
                        week4: parseFloat(row[11]) || 0,
                        week5: parseFloat(row[12]) || 0,
                        monthlyTarget: parseFloat(row[13]) || 0,
                        achievedLeads: parseFloat(row[14]) || 0,
                        achievementPct: parseFloat(row[15]) || 0
                    }));
                }
                
                const cityRows = parseCSV(cityCSV);
                if(cityRows.length > 1){
                    cityData = cityRows.slice(1).map(row => ({
                        city: row[0] || '',
                        country: row[1] || ''
                    }));
                }
                
                const configRows = parseCSV(configCSV);
                if(configRows.length > 1){
                    for(let row of configRows.slice(1)){
                        if(row[0] && row[0].toLowerCase().includes('monthly goal')) configData.monthlyGoalTotal = parseFloat(row[1]) || 176;
                        if(row[0] && row[0].toLowerCase().includes('daily goal')) configData.dailyGoalPerRegion = parseFloat(row[1]) || 2;
                    }
                }
                
                console.log('Loaded - Region:', regionData.length, 'Agent:', agentData.length, 'City:', cityData.length);
                if(regionData.length === 0 && agentData.length === 0) throw new Error('No data found');
                
                updateFilters();
                updateDashboard();
                document.getElementById('lastUpdated').innerHTML=`✅ Updated: ${new Date().toLocaleString()}`;
                document.getElementById('syncTime').innerHTML=new Date().toLocaleString();
            } catch(err){ 
                console.error(err); 
                showError('Failed: '+err.message); 
                document.getElementById('lastUpdated').innerHTML='❌ Error'; 
            } finally{ setLoading(false); }
        }
        
        function updateFilters(){
            const regions=[...new Set(regionData.map(r=>r.region).filter(r=>r))];
            const agents=[...new Set(agentData.map(a=>a.agent).filter(a=>a))];
            const cities=[...new Set(cityData.map(c=>c.city).filter(c=>c))];
            
            const rs=document.getElementById('filterRegion'); 
            rs.innerHTML='<option value="all">All Regions</option>'; 
            regions.forEach(r=>rs.innerHTML+=`<option value="${r}">${r}</option>`);
            
            const ag=document.getElementById('filterAgent'); 
            ag.innerHTML='<option value="all">All Agents</option>'; 
            agents.forEach(a=>ag.innerHTML+=`<option value="${a}">${a}</option>`);
            
            const cs=document.getElementById('filterCity'); 
            cs.innerHTML='<option value="all">All Cities</option>'; 
            cities.forEach(c=>cs.innerHTML+=`<option value="${c}">${c}</option>`);
        }
        
        function getFilteredData(){
            const selectedRegion = document.getElementById('filterRegion').value;
            const selectedAgent = document.getElementById('filterAgent').value;
            const selectedCity = document.getElementById('filterCity').value;
            const startDate = document.getElementById('dateStart').value;
            const endDate = document.getElementById('dateEnd').value;
            
            let targetRegions = new Set();
            
            if (selectedCity !== 'all') {
                const cityInfo = cityData.find(c => c.city === selectedCity);
                if (cityInfo && cityInfo.country) {
                    targetRegions.add(cityInfo.country);
                }
            }
            
            if (selectedAgent !== 'all') {
                const agentInfo = agentData.find(a => a.agent === selectedAgent);
                if (agentInfo && agentInfo.region) {
                    targetRegions.add(agentInfo.region);
                }
            }
            
            if (selectedRegion !== 'all') {
                targetRegions.add(selectedRegion);
            }
            
            if (targetRegions.size === 0) {
                regionData.forEach(r => targetRegions.add(r.region));
            }
            
            targetRegions = Array.from(targetRegions);
            
            let filteredRegion = regionData.filter(r => targetRegions.includes(r.region));
            if (startDate && endDate) {
                filteredRegion = filteredRegion.filter(r => r.date >= startDate && r.date <= endDate);
            }
            
            let filteredAgent = agentData.filter(a => targetRegions.includes(a.region));
            if (selectedAgent !== 'all') {
                filteredAgent = filteredAgent.filter(a => a.agent === selectedAgent);
            }
            
            let filteredCity = cityData.filter(c => targetRegions.includes(c.country));
            if (selectedCity !== 'all') {
                filteredCity = filteredCity.filter(c => c.city === selectedCity);
            }
            
            return { region: filteredRegion, agent: filteredAgent, city: filteredCity };
        }
        
        function updateDashboard(){
            const f = getFilteredData();
            
            const totalGoal = configData.monthlyGoalTotal;
            const totalAchieved = f.region.reduce((s,r)=>s+r.monthlyAchieved,0);
            const overallAch = totalGoal > 0 ? (totalAchieved/totalGoal)*100 : 0;
            const totalCalls = f.agent.reduce((s,a)=>s+a.totalCalls,0);
            const totalConnected = f.agent.reduce((s,a)=>s+a.connectedCalls,0);
            const totalWhatsapp = f.agent.reduce((s,a)=>s+a.whatsapp,0);
            const totalEmails = f.agent.reduce((s,a)=>s+a.emails,0);
            
            document.getElementById('kpiGrid').innerHTML = `
                <div class="kpi-card"><h4>📅 Monthly Goal</h4><div class="kpi-value">${totalGoal.toLocaleString()}</div><div class="kpi-sub">Total target for all regions</div></div>
                <div class="kpi-card"><h4>✅ Achieved Leads</h4><div class="kpi-value">${totalAchieved.toLocaleString()}</div><div class="kpi-sub">${overallAch.toFixed(1)}% of target</div></div>
                <div class="kpi-card"><h4>📞 Total Calls</h4><div class="kpi-value">${totalCalls.toLocaleString()}</div><div class="kpi-sub">Connected: ${totalConnected.toLocaleString()}</div></div>
                <div class="kpi-card"><h4>📱 WhatsApp Messages</h4><div class="kpi-value">${totalWhatsapp.toLocaleString()}</div><div class="kpi-sub">Sent via WhatsApp</div></div>
                <div class="kpi-card"><h4>📧 Emails Sent</h4><div class="kpi-value">${totalEmails.toLocaleString()}</div><div class="kpi-sub">Email communications</div></div>
            `;
            
            // Team-wise Chart
            if(charts.team) charts.team.destroy();
            if(f.region.length){
                charts.team = new Chart(document.getElementById('teamChart'), {
                    type: 'bar',
                    data: {
                        labels: f.region.map(r=>r.region),
                        datasets: [
                            { label: 'Monthly Goal', data: f.region.map(r=>r.monthlyGoal), backgroundColor: 'rgba(160,90,255,0.8)', borderRadius: 8, barPercentage: 0.6, categoryPercentage: 0.8 },
                            { label: 'Achieved', data: f.region.map(r=>r.monthlyAchieved), backgroundColor: 'rgba(27,207,180,0.8)', borderRadius: 8, barPercentage: 0.6, categoryPercentage: 0.8 }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        layout: { padding: { top: 35, bottom: 10, left: 10, right: 10 } },
                        plugins: {
                            tooltip: { callbacks: { label: function(ctx) { return ctx.dataset.label + ': ' + ctx.raw.toLocaleString(); } } },
                            legend: { position: 'top' },
                            datalabels: {
                                anchor: 'end',
                                align: 'top',
                                offset: 6,
                                formatter: (value) => value.toLocaleString(),
                                font: { weight: 'bold', size: 11 },
                                color: '#2d3a45',
                                backgroundColor: 'rgba(255,255,255,0.85)',
                                borderRadius: 4,
                                padding: { left: 5, right: 5, top: 2, bottom: 2 }
                            }
                        },
                        scales: {
                            y: { 
                                beginAtZero: true, 
                                ticks: { stepSize: 5, color: '#2d3a45' }, 
                                grid: { color: '#e2e8f0' },
                                max: Math.max(...f.region.flatMap(r => [r.monthlyGoal, r.monthlyAchieved])) + 10
                            },
                            x: { ticks: { color: '#2d3a45' }, grid: { display: false } }
                        }
                    }
                });
            }
            
            // City Chart with YOUR COLORS and labels OUTSIDE the circle
            const cityCounts = {};
            f.city.forEach(c => { cityCounts[c.city] = (cityCounts[c.city] || 0) + 1; });
            const cityLabels = Object.keys(cityCounts);
            const cityDataValues = Object.values(cityCounts);
            
            if(charts.city) charts.city.destroy();
            if(cityLabels.length){
                // Cycle through colors if more cities than colors
                const colors = [];
                for (let i = 0; i < cityLabels.length; i++) {
                    colors.push(cityColors[i % cityColors.length]);
                }
                
                charts.city = new Chart(document.getElementById('cityChart'), {
                    type: 'pie',
                    data: {
                        labels: cityLabels,
                        datasets: [{ 
                            data: cityDataValues, 
                            backgroundColor: colors,
                            borderWidth: 0,
                            hoverOffset: 10,
                            hoverBorderWidth: 2,
                            hoverBorderColor: '#fff'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        layout: { padding: { top: 20, bottom: 20, left: 20, right: 20 } },
                        plugins: {
                            tooltip: { 
                                callbacks: { 
                                    label: function(ctx) { 
                                        const total = ctx.dataset.data.reduce((a,b) => a + b, 0);
                                        const percentage = ((ctx.raw / total) * 100).toFixed(1);
                                        return `${ctx.label}: ${ctx.raw} (${percentage}%)`;
                                    } 
                                },
                                backgroundColor: '#2d3a45',
                                titleColor: '#fff',
                                bodyColor: '#fff',
                                padding: 8
                            },
                            legend: { 
                                position: 'right', 
                                labels: { 
                                    font: { size: 10, family: "'Segoe UI'" }, 
                                    usePointStyle: true, 
                                    boxWidth: 10,
                                    padding: 8,
                                    color: '#2d3a45'
                                } 
                            },
                            datalabels: {
                                formatter: (value, ctx) => {
                                    const total = ctx.dataset.data.reduce((a,b) => a + b, 0);
                                    const percentage = ((value / total) * 100).toFixed(1);
                                    if (percentage < 5) return '';
                                    return `${percentage}%`;
                                },
                                color: '#2d3a45',
                                font: { weight: 'bold', size: 11 },
                                backgroundColor: 'rgba(255,255,255,0.9)',
                                borderRadius: 20,
                                padding: { left: 8, right: 8, top: 4, bottom: 4 },
                                align: 'end',
                                anchor: 'end',
                                offset: 15,
                                clamp: false
                            }
                        },
                        elements: {
                            arc: {
                                borderWidth: 0
                            }
                        }
                    }
                });
            } else {
                const ctx = document.getElementById('cityChart').getContext('2d');
                ctx.clearRect(0, 0, 400, 300);
                ctx.font = '14px Segoe UI';
                ctx.fillStyle = '#94a3b8';
                ctx.textAlign = 'center';
                ctx.fillText('No cities found', 200, 150);
            }
            
            // Agent-wise Detailed Chart
            if(charts.agentDetailed) charts.agentDetailed.destroy();
            const sortedAgents = [...f.agent].sort((a,b) => b.achievedLeads - a.achievedLeads);
            
            if(sortedAgents.length){
                const topAgents = sortedAgents.slice(0, 15);
                const agentNames = topAgents.map(a => a.agent.length > 20 ? a.agent.substring(0, 18) + '...' : a.agent);
                
                charts.agentDetailed = new Chart(document.getElementById('agentDetailedChart'), {
                    type: 'bar',
                    data: {
                        labels: agentNames,
                        datasets: [
                            { label: 'Total Calls', data: topAgents.map(a => a.totalCalls), backgroundColor: '#A05AFF', borderRadius: 6, barPercentage: 0.8, categoryPercentage: 0.9 },
                            { label: 'Connected Calls', data: topAgents.map(a => a.connectedCalls), backgroundColor: '#1BCFB4', borderRadius: 6, barPercentage: 0.8, categoryPercentage: 0.9 },
                            { label: 'WhatsApp', data: topAgents.map(a => a.whatsapp), backgroundColor: '#FE9496', borderRadius: 6, barPercentage: 0.8, categoryPercentage: 0.9 },
                            { label: 'Emails', data: topAgents.map(a => a.emails), backgroundColor: '#4BCBEB', borderRadius: 6, barPercentage: 0.8, categoryPercentage: 0.9 },
                            { label: 'Achieved Leads', data: topAgents.map(a => a.achievedLeads), backgroundColor: '#F59E0B', borderRadius: 6, barPercentage: 0.8, categoryPercentage: 0.9 }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        indexAxis: 'y',
                        layout: { padding: { left: 10, right: 45, top: 10, bottom: 10 } },
                        plugins: {
                            tooltip: { callbacks: { label: function(ctx) { return `${ctx.dataset.label}: ${ctx.raw.toLocaleString()}`; } } },
                            legend: { position: 'bottom', labels: { font: { size: 11 }, usePointStyle: true, boxWidth: 12 } },
                            datalabels: { 
                                anchor: 'end', 
                                align: 'right', 
                                offset: 4, 
                                formatter: (value) => value > 0 ? value.toLocaleString() : '',
                                font: { weight: 'bold', size: 9 },
                                color: '#2d3a45'
                            }
                        },
                        scales: {
                            x: { beginAtZero: true, title: { display: true, text: 'Count', font: { weight: 'bold' } }, grid: { color: '#e2e8f0' } },
                            y: { ticks: { font: { size: 11 } }, grid: { display: false } }
                        }
                    }
                });
            } else {
                const ctx = document.getElementById('agentDetailedChart').getContext('2d');
                ctx.clearRect(0, 0, 800, 400);
                ctx.font = '14px Segoe UI';
                ctx.fillStyle = '#94a3b8';
                ctx.textAlign = 'center';
                ctx.fillText('No agent data available', 400, 200);
            }
        }
        
        document.getElementById('filterRegion').addEventListener('change', () => updateDashboard());
        document.getElementById('filterAgent').addEventListener('change', () => updateDashboard());
        document.getElementById('filterCity').addEventListener('change', () => updateDashboard());
        document.getElementById('dateStart').addEventListener('change', () => updateDashboard());
        document.getElementById('dateEnd').addEventListener('change', () => updateDashboard());
        
        window.onload = () => loadAllData();
    </script>
</body>
</html>
